<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TriAuto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="bg-decoration">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>
  
  <div id="app">
    <header>
      <div class="header-main">
        <div class="brand">
          <div class="logo-icon">
            <i class="bi bi-intersect"></i>
          </div>
          <h1>TriAuto</h1>
        </div>
        <label class="switch-main">
          <input type="checkbox" id="enabledToggle">
          <span class="slider-main"></span>
        </label>
      </div>
      <div id="status-message" class="status-bar">Chargement...</div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="categories">
        <i class="bi bi-stack"></i>
        <span>Catégories</span>
      </button>
      <button class="tab-btn" data-tab="stats">
        <i class="bi bi-bar-chart-fill"></i>
        <span>Stats</span>
      </button>
      <button class="tab-btn" data-tab="settings">
        <i class="bi bi-tools"></i>
        <span>Outils</span>
      </button>
    </nav>

    <main id="main-content">
      <div id="categories" class="page active">
        <div class="search-container">
          <i class="bi bi-search search-icon"></i>
          <input type="text" id="searchCategories" placeholder="Rechercher une catégorie...">
        </div>
        <ul id="categoriesList" class="custom-scrollbar"></ul>
      </div>

      <div id="stats" class="page">
        <div class="stats-summary">
          <div class="total-badge">
            <span class="label">Total triés</span>
            <strong id="totalFiles">0</strong>
          </div>
          <button id="resetStats" class="btn-icon-danger" title="Réinitialiser">
            <i class="bi bi-trash3"></i>
          </button>
        </div>
        <ul id="statsList" class="custom-scrollbar"></ul>
      </div>

      <div id="settings" class="page">
        <div class="actions-grid">
          <button id="openDownloadsFolder" class="btn-premium">
            <i class="bi bi-folder2-open"></i>
            <span class="btn-text">Dossier Téléchargements</span>
          </button>
          <button id="refreshButton" class="btn-premium secondary">
            <i class="bi bi-arrow-clockwise"></i>
            <span class="btn-text">Rafraîchir</span>
          </button>
        </div>
      </div>
    </main>
    <div class="footer-credit">
      fait par <a href="https://devengalere.fr" target="_blank"class="footer-credit__link">devengalere</a>
    </div>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
